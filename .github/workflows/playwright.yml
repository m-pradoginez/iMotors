name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request: {}

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Start application server
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > /tmp/web-dev.log 2>&1 &
          echo $! > /tmp/web-dev.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          cat /tmp/web-dev.log
          exit 1
      - name: Run Playwright smoke test
        run: npx playwright test tests/example.spec.ts --project=chromium
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:5173
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 30
      - name: Stop application server
        if: ${{ always() }}
        run: |
          if [ -f /tmp/web-dev.pid ]; then
            kill "$(cat /tmp/web-dev.pid)" || true
          fi
